  <style>
    :root {
      /* Core Palette */
      --bg-color: #0200c7;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.55);
      --accent-color: #ffffff;
      --accent-dim: rgba(255, 255, 255, 0.25);
      --error-color: #ff3366;
      --border-heavy: 4px solid var(--text-main);
      --border-thin: 2px solid var(--text-main);

      /* RGB Accents (subtle edge usage only) */
      --c-red: rgba(255, 0, 85, 0.6);
      --c-cyan: rgba(0, 255, 255, 0.6);

      /* Grid & Scanlines */
      --scanline-opacity: 0.08;
      --noise-opacity: 0.35;
    }

    /* Light Mode Overrides */
    .light-mode {
      --bg-color: #f8f9fa;
      --glass-bg: rgba(2, 0, 199, 0.08);
      --text-main: #0200c7;
      --text-muted: rgba(2, 0, 199, 0.6);
      --accent-color: #0200c7;
      --accent-dim: rgba(2, 0, 199, 0.3);
      --c-red: rgba(255, 0, 85, 0.8);
      --c-cyan: rgba(0, 150, 255, 0.8);
      --border-heavy: 4px solid var(--text-main);
      --border-thin: 2px solid var(--text-main);
    }

    /* Reset & Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: color 0.15s, background-color 0.15s;
      overflow-x: hidden;
      position: relative;
      letter-spacing: -0.02em;
      line-height: 1.5;
    }

    /* Dither / Grain Overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: var(--noise-opacity);
      pointer-events: none;
      z-index: 85;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    /* Scanlines Overlay */
    body.scanlines::before {
      content: " ";
      display: block;
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
      background-size: 100% 3px;
      z-index: 91;
      pointer-events: none;
      opacity: var(--scanline-opacity);
    }

    /* CRT Grid Overlay (Subtle Tech Feel) */
    .crt-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 86;
      opacity: 0.03;
      background-image: 
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
      border-left: 1px solid var(--accent-dim);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-dim);
      border-radius: 0px;
      border: 2px solid var(--bg-color);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-main);
    }

    /* Selection */
    ::selection {
      background: var(--text-main);
      color: var(--bg-color);
    }

    /* Focus styles */
    input:focus {
      outline: none;
    }

    /* Typography Utilities */
    .glitch-title {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      font-style: italic;
      line-height: 0.9;
    }

    /* White Brutalist Blocks */
    .white-block {
      background-color: var(--text-main);
      color: var(--bg-color);
      display: inline-block;
      padding: 0.1rem 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      font-style: italic;
      letter-spacing: -0.02em;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .white-block:hover {
      transform: translate(-1px, -1px);
      box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
    }

    /* RGB Edge Effect (Subtle split on specific elements only) */
    .edge-rgb {
      text-shadow: 1px 0 0 var(--c-red), -1px 0 0 var(--c-cyan);
    }

    /* Hover state with subtle RGB shift */
    .hover-link {
      transition: all 0.15s;
      border-bottom: 2px solid transparent;
      position: relative;
      display: inline-block;
    }
    .hover-link:hover {
      border-bottom-color: var(--text-main);
      transform: skewX(-5deg);
      text-shadow: 1px 0 0 var(--c-red), -1px 0 0 var(--c-cyan);
    }

    /* Input container states */
    .input-focus:focus-within {
      background-color: var(--glass-bg);
      transition: background-color 0.2s;
    }
    .input-locked .command-prompt {
      color: var(--error-color) !important;
      opacity: 0.6;
    }
    .input-locked input {
      cursor: wait;
      opacity: 0.4;
    }

    /* Boot Screen */
    #boot-screen {
      position: fixed;
      inset: 0;
      background-color: var(--bg-color);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      font-size: 16px;
      color: var(--text-main);
      cursor: pointer;
      transition: opacity 0.25s ease;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* Cursor Blink Animation */
    .cursor-blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Fade In Animation */
    @keyframes fadeIn {
      from { opacity: 0; filter: blur(2px); transform: translateY(4px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.25s ease-out forwards;
    }

    /* Shimmer RGB border (for header bottom) */
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .rgb-border-bottom {
      background: linear-gradient(90deg, var(--c-red), var(--c-cyan), var(--c-red));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    /* Tracking / Pagination Decor */
    .pagination-decor {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 50;
      pointer-events: none;
      opacity: 0.8;
      mix-blend-mode: difference;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--text-main);
      box-shadow: 1px 0 0 var(--c-red), -1px 0 0 var(--c-cyan);
    }
    .dot.filled {
      background-color: var(--text-main);
    }
    .tracking-num {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 2.2rem;
      line-height: 1;
      margin-left: 0.5rem;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      body {
        font-size: 14px;
      }
      .glitch-title {
        font-size: 3rem !important;
      }
    }
  </style>

  <script>
    // --- DATA LAYER ---
    const USER_DATA = {
      name: "Sajid (Alcor / Zep)",
      details: "19 · he/him · Bangladesh (GMT+6) · islam · ENFJ (FeNiSeTi) · 9w1 953 so/sx · FLEV 2122 · sanguine-phlegmatic · EIE-Fe",
      bio: `ZEP, ALCOR, SAJID.<br>Bangladeshi.<br>Gray-spec.<br>He/Him.<br>Islam.<br>19.<br><span class="text-xs text-[var(--text-muted)]">(As of uploading this post)</span>`,
      interests: {
        "series i enjoy": [
          "1. SHIN MEGAMI TENSEI / PERSONA. (I used to edit persona videos)",
          "2. ARKNIGHTS. (Love the International Typographic Style)",
          "3. PROJECT MOON. (Last played: A YEAR AGO)",

          "7. Hotel Ugly.", "8. Mac DeMarco.", "9. J Dilla.", "10. MF DOOM.",
          "11. Kanye West.", "12. Kendrick Lamar."
        ],
        "philosophies i like": [
          "1. Absurdism.", "2. Gnosticism.", "3. Neo-Platonism.",
          "4. Apophatic theology.", "5. Søren Kierkegaard's existentialism.",
          "6. Lao Tzu's Taoism.", "7. Plato's Theory of Form.",
          "8. Nietzsche's Übermensch.", "9. Carl Jung's Collective Unconscious."
        ],
        "design philosophy": [
          "1. Swiss Style", "2. Bauhaus", "3. Modernism", "4. Graphic-core",
          "5. UI-core / Cybercore", "6. Minimalism", "7. Brutalism",
          "8. Neo-Noir", "9. Lo-Fi / Grunge", "0. Technical Illustration"
        ]
      },
      links: [
        { label: "@nahzd ; yt", url: "https://youtube.com/@NahZD" },
        { label: "@SDEDIN ; rbx", url: "https://www.roblox.com/users/215212887/profile" },
        { label: "@alcorzep ; steam", url: "https://steamcommunity.com/id/alcorzep" },
        { label: "@alcor.zep ; dc,tt,ins", url: "#" }
      ]
    };

    // --- STATE ---
    const state = {
      soundEnabled: true,
      isTyping: false,
      isBooting: true,
    };

    // --- DOM ELEMENTS ---
    const els = {
      output: document.getElementById('terminal-output'),
      input: document.getElementById('command-input'),
      boot: document.getElementById('boot-screen'),
      bootLog: document.getElementById('boot-log'),
      bootProgress: document.getElementById('boot-progress'),
      inputContainer: document.getElementById('input-container'),
      soundStatus: document.getElementById('sound-status')
    };

    // --- AUDIO ENGINE (Refined Noise + Bass for VHS feel) ---
    let noiseSynth, bassSynth;
    const initAudio = () => {
      if (typeof Tone === 'undefined') return;
      try {
        // White noise burst for clicks (feels like static)
        noiseSynth = new Tone.NoiseSynth({
          noise: { type: 'white' },
          envelope: { attack: 0.001, decay: 0.08, sustain: 0, release: 0.01 },
          volume: -20
        }).toDestination();
        
        // Low bass thud for confirmations/errors
        bassSynth = new Tone.MembraneSynth({
          pitchDecay: 0.05,
          octaves: 2,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.1 },
          volume: -16
        }).toDestination();
        
        Tone.context.resume();
      } catch (e) {
        console.warn("Audio context initialization failed:", e);
      }
    };

    const playSound = (type = 'click') => {
      if (!state.soundEnabled) return;
      if (typeof Tone === 'undefined') return;
      if (Tone.context.state !== 'running') Tone.context.resume().catch(e => null);
      
      const now = Tone.now();
      try {
        if (type === 'click') {
          if (noiseSynth) noiseSynth.triggerAttackRelease("32n", now);
        }
        if (type === 'error') {
          if (bassSynth) bassSynth.triggerAttackRelease("G2", "16n", now);
          if (noiseSynth) noiseSynth.triggerAttackRelease("64n", now + 0.02);
        }
        if (type === 'success') {
          if (bassSynth) bassSynth.triggerAttackRelease("E4", "16n", now);
          if (noiseSynth) noiseSynth.triggerAttackRelease("64n", now + 0.05, 0.5);
        }
      } catch (e) { /* ignore */ }
    };

    window.toggleSound = () => {
      state.soundEnabled = !state.soundEnabled;
      els.soundStatus.textContent = state.soundEnabled ? 'AUDIO: ON' : 'AUDIO: OFF';
      playSound('click');
    };

    // --- THEME TOGGLE ---
    window.toggleTheme = () => {
      document.body.classList.toggle('light-mode');
      const icon = document.getElementById('theme-icon');
      if (document.body.classList.contains('light-mode')) {
        icon.setAttribute('data-lucide', 'sun');
      } else {
        icon.setAttribute('data-lucide', 'moon');
      }
      if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
      playSound('click');
    };

    // --- UI HELPERS ---
    const updateInputLockState = () => {
      if (state.isTyping || state.isBooting) {
        els.inputContainer.classList.add('input-locked');
        els.input.setAttribute('disabled', 'disabled');
        els.input.placeholder = state.isBooting ? '[SYSTEM BUSY]' : '[PROCESSING...]';
        removeOutputBlinker();
      } else {
        els.inputContainer.classList.remove('input-locked');
        els.input.removeAttribute('disabled');
        els.input.placeholder = 'ENTER COMMAND...';
        els.input.focus();
        addOutputBlinker();
      }
    };

    const addOutputBlinker = () => {
      if (!document.getElementById('output-blinker')) {
        const lastDiv = els.output.lastElementChild;
        if (lastDiv) {
          const blinker = document.createElement('span');
          blinker.id = 'output-blinker';
          blinker.className = 'cursor-blink bg-[var(--text-main)] inline-block w-2 h-4 md:h-5 ml-1 align-middle';
          lastDiv.appendChild(blinker);
        }
      }
    };

    const removeOutputBlinker = () => {
      const blinker = document.getElementById('output-blinker');
      if (blinker) blinker.remove();
    };

    const printPrompt = (cmd, type = 'user') => {
      removeOutputBlinker();
      const div = document.createElement('div');
      div.className = "mb-1 font-bold opacity-70 animate-fadeIn flex gap-2";
      const prefix = type === 'user' ? 'C:\\>' : 'SYS>';
      div.innerHTML = `<span class="${type === 'sys' ? 'edge-rgb' : ''}">${prefix}</span> <span>${cmd}</span>`;
      els.output.appendChild(div);
      els.output.scrollTop = els.output.scrollHeight;
    };

    const processOutput = async (html) => {
      // Simulate network/terminal thinking time
      await new Promise(resolve => setTimeout(resolve, 600));
      const div = document.createElement('div');
      div.className = "mb-6 pb-3 animate-fadeIn border-b border-dashed border-[var(--accent-dim)]";
      div.innerHTML = html;
      els.output.appendChild(div);
      els.output.scrollTop = els.output.scrollHeight;
      playSound('success');
    };

    // --- COMMAND HANDLERS ---
    const commands = {
      '!help': () => `
        <div class="white-block glitch-title text-xl md:text-2xl mb-4 italic pr-4 tracking-tighter">PROTOCOLS</div>
        <div class="grid gap-2 text-sm md:text-base">
          <div><span class="font-bold w-20 md:w-24 inline-block">!bio</span> - INTRODUCTION</div>
          <div><span class="font-bold w-20 md:w-24 inline-block">!data</span> - INTERESTS & SERIES</div>
          <div><span class="font-bold w-20 md:w-24 inline-block">!comms</span> - SOCIALS</div>
          <div><span class="font-bold w-20 md:w-24 inline-block">!clear</span> - WIPE SCREEN</div>
        </div>
      `,
      '!bio': () => `
        <div class="white-block glitch-title text-2xl md:text-3xl mb-4 italic pr-6 tracking-tighter">INTRODUCTION</div>
        <div class="text-lg md:text-xl leading-relaxed mb-4">${USER_DATA.bio}</div>
        <div class="flex flex-wrap gap-2 text-sm md:text-base font-bold">
          <span class="white-block">ENFJ · Fe Ni Se Ti</span>
          <span class="white-block">SO·SX</span>
          <span class="white-block">9w1 · 953</span>
          <span class="white-block">FLEV · 2122</span>
          <span class="white-block">Sanguine-Phlegmatic</span>
        </div>
      `,
      '!data': () => {
        let html = '';
        for (const [category, items] of Object.entries(USER_DATA.interests)) {
          html += `<div class="white-block glitch-title text-xl md:text-2xl mb-3 mt-6 italic pr-4 tracking-tighter uppercase">${category}</div>`;
          html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2 mt-2 text-sm md:text-base">`;
          items.forEach(item => html += `<div class="font-medium opacity-90 hover:opacity-100 transition-opacity pl-2 border-l-2 border-[var(--accent-dim)]">${item}</div>`);
          html += `</div>`;
        }
        return html;
      },
      '!comms': () => {
        let html = `<div class="white-block glitch-title text-3xl md:text-4xl mb-5 italic pr-8 tracking-tighter">SOCIALS</div>`;
        html += `<div class="flex flex-col gap-2 font-bold text-xl md:text-2xl">`;
        USER_DATA.links.forEach(l => {
          html += `<a href="${l.url}" target="_blank" rel="noopener noreferrer" class="hover-link w-fit">${l.label}</a>`;
        });
        html += `</div>`;
        return html;
      }
    };

    const handleCommand = async (raw) => {
      if (state.isTyping || state.isBooting) {
        if (raw.trim()) playSound('error');
        return;
      }
      const input = raw.trim();
      if (!input) return;
      
      const cmd = input.split(/\s+/)[0].toLowerCase();
      printPrompt(input, 'user');
      
      state.isTyping = true;
      updateInputLockState();

      try {
        if (cmd === '!clear') {
          els.output.innerHTML = '';
          playSound('success');
        } else if (commands[cmd]) {
          await processOutput(commands[cmd]());
        } else {
          playSound('error');
          await processOutput(`
            <div class="flex items-center gap-3">
              <span class="white-block bg-[var(--error-color)] text-white">ERROR: INVALID COMMAND</span>
              <span class="text-xs opacity-50">Type !help for available protocols.</span>
            </div>
          `);
        }
      } finally {
        state.isTyping = false;
        updateInputLockState();
      }
    };

    // --- BOOT SEQUENCE (Enhanced) ---
    const runBootSequence = async () => {
      updateInputLockState();
      
      const bootLines = [
        "MEMORY CHECK...... OK",
        "INITIALIZING VHS OVERLAY ENGINE...",
        "LOADING CHROMATIC ABERRATION MODULE...",
        "> ALCOR.SYS DETECTED",
        "BLUE SCREEN PROTOCOL ACTIVE.",
        "ESTABLISHING SECURE CONNECTION..."
      ];

      for (let i = 0; i < bootLines.length; i++) {
        const p = document.createElement('div');
        p.innerHTML = bootLines[i];
        p.style.opacity = '0.7';
        els.bootLog.appendChild(p);
        // Update progress bar
        els.bootProgress.style.width = `${((i + 1) / bootLines.length) * 100}%`;
        await new Promise(r => setTimeout(r, 250));
      }
      
      await new Promise(r => setTimeout(r, 500));
      finalizeBootAndGreet();
    };

    const finalizeBootAndGreet = async () => {
      if (!state.isBooting) return;
      state.isBooting = false;
      
      // Finalize progress bar
      els.bootProgress.style.width = '100%';
      
      const greeting = `<span class="white-block glitch-title text-xl md:text-2xl italic pr-4 tracking-tighter">ABOUT ME.</span><br><br><span class="opacity-80">polaris v2.0 initialized. type</span> <span class="font-bold border-b-2 border-[var(--text-main)]">!help</span> <span class="opacity-80">to begin.</span>`;
      
      await new Promise(r => setTimeout(r, 200));
      printPrompt(greeting, 'sys');
      playSound('success');
      
      // Fade out boot screen
      els.boot.style.opacity = '0';
      els.boot.style.pointerEvents = 'none';
      
      state.isTyping = false;
      updateInputLockState();
    };

    // --- EVENT LISTENERS ---
    els.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleCommand(els.input.value);
        els.input.value = '';
      } else if (e.key.length === 1 || e.key === 'Backspace') {
        if (!state.isTyping && !state.isBooting) playSound('click');
      }
    });

    els.boot.addEventListener('click', () => {
      if (state.isBooting) finalizeBootAndGreet();
    });

    // --- INITIALIZATION ---
    const init = () => {
      initAudio();
      if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
      
      // Auto-boot after a short delay
      setTimeout(runBootSequence, 800);
      
      // Focus input on click outside interactive elements
      document.addEventListener('click', (e) => {
        if (!window.getSelection()?.toString() && !e.target.closest('a, button, input, #boot-screen')) {
          if (!state.isBooting && !state.isTyping) els.input.focus();
        }
      });

      // Simulate tracking number changes (purely decorative)
      setInterval(() => {
        const tracker = document.querySelector('.tracking-num');
        if (tracker) {
          const num = Math.floor(Math.random() * 9000) + 1000;
          tracker.textContent = num;
        }
      }, 3000);
    };

    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
